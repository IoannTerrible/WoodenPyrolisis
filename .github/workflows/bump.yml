name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New mod version (e.g. 1.0.1)"
        required: true
        type: string
      changes:
        description: "Changelog entries — one per line (leave blank to fill in manually later)"
        required: false
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Read current state from VERSION (single source of truth) ──────────

      - name: Read current state
        id: current
        run: |
          OLD_VER=$(cat VERSION | tr -d '[:space:]')
          MOD_NAME=$(jq -r '.name' "$(find . -maxdepth 2 -name "info.json" | head -1)")
          OLD_DIR=$(find . -maxdepth 1 -type d -name "${MOD_NAME}_*" | head -1 | sed 's|^\./||')
          NEW_VER="${{ inputs.version }}"

          echo "old_ver=$OLD_VER"             >> "$GITHUB_OUTPUT"
          echo "new_ver=$NEW_VER"             >> "$GITHUB_OUTPUT"
          echo "mod_name=$MOD_NAME"           >> "$GITHUB_OUTPUT"
          echo "old_dir=$OLD_DIR"             >> "$GITHUB_OUTPUT"
          echo "new_dir=${MOD_NAME}_${NEW_VER}" >> "$GITHUB_OUTPUT"
          echo "Bumping: $MOD_NAME $OLD_VER → $NEW_VER"

      # ── 2. Update VERSION file ───────────────────────────────────────────────

      - name: Update VERSION
        run: |
          echo "${{ steps.current.outputs.new_ver }}" > VERSION
          echo "VERSION → ${{ steps.current.outputs.new_ver }}"

      # ── 3. Update info.json ──────────────────────────────────────────────────

      - name: Update info.json
        run: |
          INFO="${{ steps.current.outputs.old_dir }}/info.json"
          jq --arg v "${{ steps.current.outputs.new_ver }}" '.version = $v' "$INFO" > "$INFO.tmp"
          mv "$INFO.tmp" "$INFO"
          echo "info.json version → ${{ steps.current.outputs.new_ver }}"

      # ── 4. Rename mod folder ─────────────────────────────────────────────────

      - name: Rename mod folder
        run: |
          OLD="${{ steps.current.outputs.old_dir }}"
          NEW="${{ steps.current.outputs.new_dir }}"
          if [ "$OLD" = "$NEW" ]; then
            echo "Folder already named $NEW — skipping."
          else
            git mv "$OLD" "$NEW"
            echo "Renamed: $OLD → $NEW"
          fi

      # ── 5. Sync assets/thumbnail.png from mod folder ────────────────────────

      - name: Sync thumbnail to assets
        run: |
          cp "${{ steps.current.outputs.new_dir }}/thumbnail.png" assets/thumbnail.png
          echo "assets/thumbnail.png updated"

      # ── 6. Prepend changelog entry ───────────────────────────────────────────

      - name: Update changelog.txt
        run: |
          CHANGELOG="${{ steps.current.outputs.new_dir }}/changelog.txt"
          NEW_VER="${{ steps.current.outputs.new_ver }}"
          TODAY=$(date -u +%Y-%m-%d)
          CHANGES="${{ inputs.changes }}"
          DIVIDER="---------------------------------------------------------------------------------------------------"

          NEW_BLOCK="$DIVIDER\nVersion: $NEW_VER\nDate: $TODAY"

          if [ -n "$CHANGES" ]; then
            NEW_BLOCK="$NEW_BLOCK\n  Changes:"
            while IFS= read -r line; do
              [ -n "$line" ] && NEW_BLOCK="$NEW_BLOCK\n    - $line"
            done <<< "$CHANGES"
          else
            NEW_BLOCK="$NEW_BLOCK\n  Changes:\n    - (fill in)"
          fi

          printf "%b\n" "$NEW_BLOCK" | cat - "$CHANGELOG" > changelog.tmp
          mv changelog.tmp "$CHANGELOG"

      # ── 7. Commit and push to product (triggers publish.yml) ─────────────────

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "v${{ steps.current.outputs.new_ver }} Bump to ${{ steps.current.outputs.new_ver }}"
          git push origin HEAD:product
