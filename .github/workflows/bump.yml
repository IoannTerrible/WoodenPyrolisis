name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version (e.g. 1.0.1)"
        required: true
        type: string
      changes:
        description: "Changelog entries — one per line (leave blank to fill in manually later)"
        required: false
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Resolve current state ────────────────────────────────────────────
      - name: Read current mod info
        id: current
        run: |
          INFO_PATH=$(find . -maxdepth 2 -name "info.json" | head -1)
          OLD_DIR=$(dirname "$INFO_PATH" | sed 's|^\./||')
          MOD_NAME=$(jq -r '.name' "$INFO_PATH")
          OLD_VER=$(jq  -r '.version' "$INFO_PATH")
          NEW_VER="${{ inputs.version }}"
          NEW_DIR="${MOD_NAME}_${NEW_VER}"

          echo "info_path=$INFO_PATH" >> "$GITHUB_OUTPUT"
          echo "old_dir=$OLD_DIR"     >> "$GITHUB_OUTPUT"
          echo "new_dir=$NEW_DIR"     >> "$GITHUB_OUTPUT"
          echo "mod_name=$MOD_NAME"   >> "$GITHUB_OUTPUT"
          echo "old_ver=$OLD_VER"     >> "$GITHUB_OUTPUT"
          echo "new_ver=$NEW_VER"     >> "$GITHUB_OUTPUT"

      # ── 2. Rename the mod folder ────────────────────────────────────────────
      - name: Rename mod folder
        run: |
          OLD="${{ steps.current.outputs.old_dir }}"
          NEW="${{ steps.current.outputs.new_dir }}"
          if [ "$OLD" = "$NEW" ]; then
            echo "Folder already named $NEW — skipping rename."
          else
            git mv "$OLD" "$NEW"
            echo "Renamed: $OLD → $NEW"
          fi

      # ── 3. Update version in info.json ──────────────────────────────────────
      - name: Update info.json
        run: |
          INFO="${{ steps.current.outputs.new_dir }}/info.json"
          NEW_VER="${{ steps.current.outputs.new_ver }}"
          jq --arg v "$NEW_VER" '.version = $v' "$INFO" > "$INFO.tmp"
          mv "$INFO.tmp" "$INFO"
          echo "info.json version → $NEW_VER"

      # ── 4. Prepend changelog entry ──────────────────────────────────────────
      - name: Update changelog.txt
        run: |
          CHANGELOG="${{ steps.current.outputs.new_dir }}/changelog.txt"
          NEW_VER="${{ steps.current.outputs.new_ver }}"
          TODAY=$(date -u +%Y-%m-%d)
          CHANGES="${{ inputs.changes }}"
          DIVIDER="---------------------------------------------------------------------------------------------------"

          # Build the new block
          NEW_BLOCK="$DIVIDER\nVersion: $NEW_VER\nDate: $TODAY"

          if [ -n "$CHANGES" ]; then
            NEW_BLOCK="$NEW_BLOCK\n  Changes:"
            while IFS= read -r line; do
              [ -n "$line" ] && NEW_BLOCK="$NEW_BLOCK\n    - $line"
            done <<< "$CHANGES"
          else
            NEW_BLOCK="$NEW_BLOCK\n  Changes:\n    - (fill in)"
          fi

          # Prepend to existing changelog
          printf "%b\n" "$NEW_BLOCK" | cat - "$CHANGELOG" > changelog.tmp
          mv changelog.tmp "$CHANGELOG"

      # ── 5. Commit and push to product (triggers publish.yml) ────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_DIR="${{ steps.current.outputs.new_dir }}"
          NEW_VER="${{ steps.current.outputs.new_ver }}"
          MOD_NAME="${{ steps.current.outputs.mod_name }}"

          git add "$NEW_DIR" changelog.tmp 2>/dev/null || true
          git add --all
          git commit -m "chore: bump $MOD_NAME to v$NEW_VER"
          git push origin HEAD:product
