[item-name]
biochar=Biochar

[item-description]
biochar=A carbon-rich solid fuel produced by the pyrolysis of wood. Burns similarly to coal.

[fluid-name]
pyrolysis-oil=Pyrolysis Oil
wood-gas=Wood Gas
methanol=Wood Alcohol (Methanol)

[fluid-description]
pyrolysis-oil=A dark, viscous bio-oil condensed from wood pyrolysis vapours. Can substitute for crude-oil derivatives.
wood-gas=A combustible gas mixture of CO, hydrogen, and light hydrocarbons released during wood pyrolysis.
methanol=A highly flammable, colourless alcohol derived from wood distillation. Historically known as wood spirit, used as a solvent and precursor to synthetic plastics and fuels.

[recipe-name]
wood-pyrolysis=Wood Pyrolysis
fischer-tropsch-synthesis=Fischer-Tropsch Synthesis
bio-oil-distillation=Bio-Oil Distillation
methanol-plastic=Bakelite Synthesis
methanol-solid-fuel=Methanol-to-Fuel

[recipe-description]
wood-pyrolysis=Thermally decompose wood in the absence of oxygen to yield biochar, pyrolysis oil, and wood gas.
fischer-tropsch-synthesis=Catalytically converts syngas (CO and H₂ from wood gas) into liquid hydrocarbons. The Fischer-Tropsch process was used industrially since the 1920s to synthesise fuels from non-petroleum feedstocks.
bio-oil-distillation=Fractional distillation of pyroligneous acid (wood tar). Separates the heavy tar fractions from the water-soluble fraction rich in methanol and acetic acid, as practised in 19th-century wood-distillation industry.
methanol-plastic=Produces Bakelite-like phenol-formaldehyde resin. Methanol is oxidised to formaldehyde, which then condenses with phenols present in coal tar to form the first fully synthetic plastic, invented by Leo Baekeland in 1907.
methanol-solid-fuel=Converts methanol into a dense synthetic fuel via the Methanol-to-Gasoline (MTG) process, developed by Mobil in the 1970s. Methanol is dehydrated over a zeolite catalyst to produce hydrocarbons suitable as solid fuel.
